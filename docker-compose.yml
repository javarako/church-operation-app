services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    environment:
      SPRING_MONGODB_URI: mongodb://mongo:27017/church_operations
      TZ: ${CHURCH_TIME_ZONE:-America/Toronto}
      CHURCH_NAME: ${CHURCH_NAME:-${CHURCH_NAME_VALUE:-Capstone Presbyterian Church}}
      CHURCH_ADDRESS: ${CHURCH_ADDRESS:-${CHURCH_ADDRESS_VALUE:-111 Cactus Ave, North York, ON M2R 2V1}}
      CHURCH_CONTACT_INFO: ${CHURCH_CONTACT_INFO:-${CHURCH_CONTACT_INFO_VALUE:-lovecapstone@gmail.com}}
      CHURCH_TREASURER_NAME: ${CHURCH_TREASURER_NAME:-${CHURCH_TREASURER_NAME_VALUE:-Treasurer}}
      CHURCH_CHARITY_REGISTRATION_NUMBER: ${CHURCH_CHARITY_REGISTRATION_NUMBER:-${CHURCH_CHARITY_REGISTRATION_NUMBER_VALUE:-}}
      CHURCH_RECEIPT_ISSUE_LOCATION: ${CHURCH_RECEIPT_ISSUE_LOCATION:-${CHURCH_RECEIPT_ISSUE_LOCATION_VALUE:-Toronto, Ontario}}
      CHURCH_WEBSITE: ${CHURCH_WEBSITE:-${CHURCH_WEBSITE_VALUE:-}}
      CHURCH_MEMBER_IMAGE_MAX_SIZE: ${CHURCH_MEMBER_IMAGE_MAX_SIZE:-5MB}
      CHURCH_DATA_MAX_UPLOAD_SIZE: ${CHURCH_DATA_MAX_UPLOAD_SIZE:-2GB}
      CHURCH_DATA_TEMP_DIRECTORY: /var/lib/church-operation/temp
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-${GMAIL_SMTP_USERNAME:-${BREVO_SMTP_USERNAME:-}}}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-${GMAIL_SMTP_APP_PASSWORD:-${BREVO_SMTP_PASSWORD:-}}}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-true}
      PASSWORD_RESET_FRONTEND_BASE_URL: ${PASSWORD_RESET_FRONTEND_BASE_URL:-http://localhost:5173}
      PASSWORD_RESET_FROM_ADDRESS: ${PASSWORD_RESET_FROM_ADDRESS:-no-reply@church.local}
    ports:
      - "8080:8080"
    volumes:
      - church-temp:/var/lib/church-operation/temp
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo-data:
  church-temp:
