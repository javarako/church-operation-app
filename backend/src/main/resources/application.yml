spring:
  application:
    name: church-operation
  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://localhost:27017/church_operations}
  data:
    mongodb:
      auto-index-creation: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}
  servlet:
    multipart:
      max-file-size: ${CHURCH_DATA_MAX_UPLOAD_SIZE:2GB}
      max-request-size: ${CHURCH_DATA_MAX_UPLOAD_SIZE:2GB}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

church:
  reference-data:
    seed-defaults: ${CHURCH_REFERENCE_DATA_SEED_DEFAULTS:false}
  data-management:
    temp-directory: ${CHURCH_DATA_TEMP_DIRECTORY:${java.io.tmpdir}/church-operation-data}
    operation-expiry: ${CHURCH_DATA_OPERATION_EXPIRY:30m}
    max-upload-size: ${CHURCH_DATA_MAX_UPLOAD_SIZE:2GB}
  fiscal-year:
    start-month: ${CHURCH_FISCAL_YEAR_START_MONTH:1}
  information:
    name: ${CHURCH_NAME:church name --- IGNORE ---}
    address: ${CHURCH_ADDRESS:church address --- IGNORE ---}
    contact-info: ${CHURCH_CONTACT_INFO:contact info --- IGNORE ---}
    treasurer-name: ${CHURCH_TREASURER_NAME:treasurer name --- IGNORE ---}
    charity-registration-number: ${CHURCH_CHARITY_REGISTRATION_NUMBER:}
    receipt-issue-location: ${CHURCH_RECEIPT_ISSUE_LOCATION:}
    website: ${CHURCH_WEBSITE:}
  branding:
    banner-path: /branding/church-banner.png
    log-path: /branding/church_logo.png
  ui:
    list-page-size: ${CHURCH_LIST_PAGE_SIZE:20}
  member-image:
    max-size: ${CHURCH_MEMBER_IMAGE_MAX_SIZE:5MB}
  password-reset:
    frontend-base-url: ${PASSWORD_RESET_FRONTEND_BASE_URL:http://localhost:5173}
    token-lifetime: ${PASSWORD_RESET_TOKEN_LIFETIME:30m}
    from-address: ${PASSWORD_RESET_FROM_ADDRESS:no-reply@church.local}
